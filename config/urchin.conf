# enable bluetooth
CONFIG_BT=y

# increase bluetooth signal power
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# enable deep sleep support
CONFIG_ZMK_SLEEP=y
# 10 秒后进入空闲状态，停止显示刷新；BLE 保持连接
CONFIG_ZMK_IDLE_TIMEOUT=10000
# 10 分钟后进入深度睡眠并断开 BLE
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=600000

# 每 10 分钟采样一次电池，减少 ADC 唤醒
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=600

# === DISPLAY ===
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
# nice-view-gem 动画关闭后，1Hz 足以刷新状态
CONFIG_NICE_VIEW_GEM_ANIMATION=n
CONFIG_ZMK_DISPLAY_TICK_PERIOD_MS=1000

# nRF52840 nice!nano 默认启用普通 DCDC；克隆板关闭高压 DCDC
CONFIG_BOARD_ENABLE_DCDC_HV=n

# 如果你完全没有焊接 RGB，直接彻底禁用 RGB 驱动，防止引脚漏电
CONFIG_ZMK_RGB_UNDERGLOW=n

# 启用外部设备 VCC 控制；深度睡眠时由设备电源管理自动切断
CONFIG_ZMK_EXT_POWER=y

# source: https://github.com/M165437/nice-view-gem/blob/main/README.md
